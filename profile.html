<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSS Business Profile</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .page {
      min-height: 100vh;
      padding: 30px 15px;
    }

    .card {
      max-width: 920px;
      margin: auto;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }

    .header {
      padding: 40px 25px;
      text-align: center;
    }

    .logo {
      width: 135px;
      height: 135px;
      object-fit: cover;
      border-radius: 50%;
      background: white;
      margin-bottom: 18px;
      border: 4px solid white;
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .tagline {
      font-size: 18px;
      margin-top: 10px;
      opacity: 0.95;
    }

    .content {
      padding: 32px;
    }

    .section-title {
      font-size: 14px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .bio {
      font-size: 17px;
      line-height: 1.6;
      margin: 0 0 28px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 25px;
    }

    .info-box {
      background: #f9fafb;
      padding: 18px;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
    }

    .label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .value {
      font-size: 16px;
      font-weight: bold;
      word-break: break-word;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }

    .btn {
      flex: 1;
      min-width: 170px;
      text-align: center;
      text-decoration: none;
      padding: 15px 18px;
      border-radius: 12px;
      font-weight: bold;
      color: white;
      background: #111827;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .btn.secondary {
      background: #2563eb;
    }

    .btn.whatsapp {
      background: #16a34a;
    }

    .btn.map {
      background: #7c3aed;
    }

    .btn.claim {
      background: #f59e0b;
      color: #111827;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #6b7280;
      background: #f9fafb;
    }

    .classic .header {
      background: #1f2937;
      color: white;
    }

    .modern .header {
      background: linear-gradient(135deg, #2563eb, #14b8a6);
      color: white;
    }

    .premium {
      background: #111827;
    }

    .premium .card {
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
    }

    .premium .header {
      background: linear-gradient(135deg, #111827, #92400e, #f59e0b);
      color: white;
    }

    .premium .content {
      background: #0f172a;
    }

    .premium .info-box {
      background: #1e293b;
      border-color: #334155;
    }

    .premium .label,
    .premium .section-title {
      color: #cbd5e1;
    }

    .premium .footer {
      background: #020617;
      color: #94a3b8;
    }

    .loading,
    .error {
      max-width: 700px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 28px;
      }

      .content {
        padding: 24px;
      }

      .btn {
        min-width: 100%;
      }
    }
  </style>
</head>

<body>
  <div id="app" class="page">
    <div class="loading">Cargando perfil...</div>
  </div>

  <script>
    const SUPABASE_URL = "https://ikpipurcoztxanrdwzvm.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlrcGlwdXJjb3p0eGFucmR3enZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTc0MDIsImV4cCI6MjA5MjA5MzQwMn0.E33Gc3OyYkig81xsvF6T9r_ANtFbSUc24D1vLenn3y4";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getSlug() {
      const params = new URLSearchParams(window.location.search);
      const querySlug = params.get("slug");

      if (querySlug) return querySlug;

      const pathParts = window.location.pathname.split("/").filter(Boolean);
      return pathParts[pathParts.length - 1];
    }

    function clean(value, fallback = "No disponible") {
      return value && String(value).trim() !== "" ? value : fallback;
    }

    function phoneLink(phone) {
      if (!phone) return "#";
      return "tel:" + phone.replace(/\D/g, "");
    }

    function whatsappLink(phone, businessName) {
      if (!phone) return "#";

      const cleanPhone = phone.replace(/\D/g, "");

      const message = encodeURIComponent(
        `Hola, estoy viendo tu perfil en BSS y quiero más información sobre ${businessName || "tu negocio"}.`
      );

      return `https://wa.me/1${cleanPhone}?text=${message}`;
    }

    function mapLink(address, city) {
      const fullAddress = `${address || ""} ${city || ""}`.trim();

      if (!fullAddress) return "#";

      return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(fullAddress);
    }

    function websiteLink(website) {
      if (!website) return "#";

      if (website.startsWith("http://") || website.startsWith("https://")) {
        return website;
      }

      return "https://" + website;
    }

    async function loadProfile() {
      const slug = getSlug();
      const app = document.getElementById("app");

      if (!slug) {
        app.innerHTML = `<div class="error">Perfil no encontrado. Falta el slug.</div>`;
        return;
      }

      const { data, error } = await supabaseClient
        .from("businesses")
        .select("*")
        .or(`profile_slug.eq.${slug},profileurl.eq.${slug}`)
        .single();

      if (error || !data) {
        app.innerHTML = `<div class="error">Este perfil no está disponible.</div>`;
        return;
      }

      const template = data.template || "classic";
      const logo = data.logo || "https://dummyimage.com/140x140/ffffff/000000.png&text=BSS";
      const isClient = data.isclient === true;

      document.title = clean(data.name, "BSS Business Profile");

      app.className = `page ${template}`;

      app.innerHTML = `
        <div class="card">
          <div class="header">
            <img class="logo" src="${logo}" alt="Logo de ${clean(data.name)}" />
            <h1>${clean(data.name)}</h1>
            <div class="tagline">${clean(data.tagline, "")}</div>
          </div>

          <div class="content">
            <div>
              <div class="section-title">Sobre el negocio</div>
              <p class="bio">${clean(data.bio, "Este negocio todavía no ha añadido una descripción.")}</p>
            </div>

            <div class="info-grid">
              <div class="info-box">
                <div class="label">Categoría</div>
                <div class="value">${clean(data.category)}</div>
              </div>

              <div class="info-box">
                <div class="label">Ciudad</div>
                <div class="value">${clean(data.city)}</div>
              </div>

              <div class="info-box">
                <div class="label">Dirección</div>
                <div class="value">${clean(data.address)}</div>
              </div>

              <div class="info-box">
                <div class="label">Horario</div>
                <div class="value">${clean(data.hours)}</div>
              </div>

              <div class="info-box">
                <div class="label">Teléfono</div>
                <div class="value">${clean(data.phone)}</div>
              </div>

              <div class="info-box">
                <div class="label">Email</div>
                <div class="value">${clean(data.email)}</div>
              </div>
            </div>

            <div class="buttons">
              <a class="btn" href="${phoneLink(data.phone)}">Llamar</a>
              <a class="btn whatsapp" href="${whatsappLink(data.phone, data.name)}" target="_blank">WhatsApp</a>
              <a class="btn map" href="${mapLink(data.address, data.city)}" target="_blank">Ubicación</a>

              ${
                isClient
                  ? `<a class="btn secondary" href="${websiteLink(data.website)}" target="_blank">Website</a>`
                  : `<a class="btn claim" href="mailto:info@bssoperations.com?subject=Reclamar negocio - ${encodeURIComponent(data.name || "")}">Reclamar negocio</a>`
              }
            </div>
          </div>

          <div class="footer">
            Perfil publicado por BSS Operations
          </div>
        </div>
      `;
    }

    loadProfile();
  </script>
</body>
</html>
