<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSS Operations - Maintenance</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111111;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .wrapper {
      max-width: 700px;
      padding: 40px 20px;
    }

    .logo {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #cccccc;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo">BSS Operations</div>
    <h1>System Under Maintenance</h1>
    <p>We are currently working on improvements to the website.<br>Please check back later.</p>
  </div>
</body>
</html>
