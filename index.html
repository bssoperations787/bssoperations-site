<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BSS Business Profiles</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    .hero {
      padding:60px 20px;
      text-align:center;
      background:linear-gradient(135deg,#1e293b,#020617);
    }

    h1 {
      font-size:2.8em;
    }

    .search {
      padding:20px;
      text-align:center;
    }

    .search input {
      width:80%;
      padding:15px;
      border-radius:10px;
      border:none;
    }

    .container {
      width:90%;
      max-width:1100px;
      margin:auto;
    }

    .card {
      background:#1e293b;
      padding:20px;
      margin:20px 0;
      border-radius:15px;
    }

    .logo {
      width:60px;
      height:60px;
      border-radius:10px;
      object-fit:cover;
    }

    button {
      padding:12px 20px;
      border:none;
      border-radius:10px;
      background:#38bdf8;
      cursor:pointer;
      margin-top:10px;
    }

    .top-bar {
      text-align:center;
      padding:20px;
    }

    .invite-btn {
      background:#9333ea;
      color:white;
      padding:12px 20px;
      border-radius:10px;
      text-decoration:none;
      display:inline-block;
      margin-top:10px;
    }

  </style>
</head>

<body>

<div class="hero">
  <h1>BSS Business Profiles</h1>
  <p>Perfiles seleccionados de negocios dentro de la red BSS</p>
</div>

<div class="top-bar">
  <a href="invite.html" class="invite-btn">Solicitar invitación</a>
</div>

<div class="search">
  <input type="text" id="searchInput" placeholder="Buscar negocio...">
</div>

<div class="container" id="profilesContainer"></div>

<!-- 🔥 AQUÍ SE CONECTA LA BASE -->
<script src="data.js"></script>

<script>

function canPublish(business) {
  return (
    business.source === "honeybook" &&
    business.isClient === true &&
    business.logo &&
    business.name &&
    business.address &&
    business.hours
  );
}

function renderProfiles() {
  const container = document.getElementById("profilesContainer");
  const query = document.getElementById("searchInput").value.toLowerCase();

  const filtered = businesses
    .filter(canPublish)
    .filter(b =>
      b.name.toLowerCase().includes(query) ||
      b.city.toLowerCase().includes(query)
    );

  if (filtered.length === 0) {
    container.innerHTML = "<p>No hay negocios disponibles.</p>";
    return;
  }

  container.innerHTML = filtered.map(b => `
    <div class="card">
      <img src="${b.logo}" class="logo">

      <h2>${b.name}</h2>
      <p>${b.tagline}</p>

      <p>📍 ${b.city}</p>

      <button onclick="location.href='${b.profileUrl}'">
        Ver espacio
      </button>
    </div>
  `).join("");
}

document.getElementById("searchInput").addEventListener("input", renderProfiles);

renderProfiles();

</script>

</body>
</html>
