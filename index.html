<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS Public Profiles</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container {
    width:90%;
    max-width:1100px;
    margin:auto;
}

.hero {
    padding:60px 20px;
    text-align:center;
    background:linear-gradient(135deg,#1e293b,#020617);
}

h1 {
    font-size:2.8em;
}

.search {
    padding:20px;
    text-align:center;
}

.search input {
    width:80%;
    padding:15px;
    border-radius:10px;
    border:none;
}

.card {
    background:#1e293b;
    padding:20px;
    margin:20px 0;
    border-radius:15px;
}

button {
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    cursor:pointer;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>BSS Business Profiles</h1>
    <p>Plataforma donde los negocios promocionan su espacio público</p>
</div>

<div class="search">
    <input type="text" placeholder="Buscar negocio...">
</div>

<div class="container">

    <!-- NEGOCIO 1 -->
    <div class="card">
        <h2>Big Bang Mini Market & Sport Bar</h2>
        <p>Mini Market + Sport Bar con ambiente social y promociones.</p>

        <button onclick="window.location.href='big-bang-mini-market-sport-bar.html'">
            Ver espacio
        </button>
    </div>

    <!-- FUTUROS NEGOCIOS -->
    <div class="card">
        <h2>Próximamente</h2>
        <p>Aquí aparecerán más negocios.</p>
    </div>

</div>

</body>
</html>
