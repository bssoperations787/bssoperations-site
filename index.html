<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSS Operations</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
    }

    .container{
      max-width:1000px;
      margin:auto;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:15px;
      margin-bottom:15px;
    }

    .logo{
      width:80px;
      height:80px;
      object-fit:cover;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>BSS Business Profiles</h1>

  <div id="profiles"></div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://ikpipurcoztxanrdwzvm.supabase.co";
const SUPABASE_KEY = "sb_publishable_HN06LJy1sLPPCVSJ9jQ4NQ_FreY5Gjp";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function canPublish(b){
  return (
    b.source === "honeybook" &&
    b.isclient === true &&
    b.logo &&
    b.name &&
    b.address &&
    b.hours
  );
}

async function loadProfiles(){

  const { data, error } = await supabase
    .from("businesses")
    .select("*");

  if(error){
    console.error(error);
    document.getElementById("profiles").innerHTML = "Error cargando datos";
    return;
  }

  const valid = data.filter(canPublish);

  if(valid.length === 0){
    document.getElementById("profiles").innerHTML = "No hay perfiles aún";
    return;
  }

  document.getElementById("profiles").innerHTML = valid.map(b => `
    <div class="card">
      <img class="logo" src="${b.logo}">
      <h2>${b.name}</h2>
      <p>${b.tagline || ""}</p>
      <p>📍 ${b.address}</p>
      <p>🕒 ${b.hours}</p>
      <p>📞 ${b.phone || ""}</p>
    </div>
  `).join("");
}

loadProfiles();

</script>

</body>
</html>
