<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Business - BSS Operations</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>BSS Edit Test</h1>
  <div id="app">Loading...</div>

  <script>
    const SUPABASE_URL = 'https://ikpipurcoztxanrdwzvm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlrcGlwdXJjb3p0eGFucmR3enZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTc0MDIsImV4cCI6MjA5MjA5MzQwMn0.E33Gc3OyYkig81xsvF6T9r_ANtFbSUc24D1vLenn3y4';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const app = document.getElementById('app');

    function getTokenFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token');
    }

    async function runTest() {
      const token = getTokenFromUrl();

      if (!token) {
        app.textContent = 'Missing token in URL';
        return;
      }

      const { data, error } = await supabaseClient
        .from('businesses')
        .select('id, name, edit_token, profile_slug, profileurl')
        .eq('edit_token', token)
        .maybeSingle();

      if (error) {
        app.innerHTML = '<pre>' + JSON.stringify(error, null, 2) + '</pre>';
        return;
      }

      if (!data) {
        app.textContent = 'No business found for this token';
        return;
      }

      app.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
    }

    runTest();
  </script>
</body>
</html>
