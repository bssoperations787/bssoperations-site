<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .topbar {
      background: #111827;
      color: white;
      padding: 18px 24px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .title {
      margin: 0;
      font-size: 28px;
    }

    .subtitle {
      margin: 6px 0 0;
      color: #6b7280;
    }

    .tools {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-input {
      width: 280px;
      max-width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .message {
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 12px;
      display: none;
      font-weight: bold;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      font-size: 14px;
    }

    td {
      font-size: 14px;
    }

    .logo-thumb {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      object-fit: cover;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
    }

    .status {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .status.ready {
      background: #dcfce7;
      color: #166534;
    }

    .status.pending {
      background: #fef3c7;
      color: #92400e;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .small-link,
    .small-button {
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: bold;
      display: inline-block;
      background: #111827;
      color: white;
      border: none;
      cursor: pointer;
    }

    .small-link.secondary,
    .small-button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .small-link:hover,
    .small-button:hover {
      opacity: 0.9;
    }

    .empty-box {
      text-align: center;
      padding: 30px;
      color: #6b7280;
    }

    @media (max-width: 768px) {
      .search-input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">BSS Operations</div>

  <div class="container">
    <div class="card">
      <div class="header-row">
        <div>
          <h1 class="title">Business Dashboard</h1>
          <p class="subtitle">Manage business profiles and share private edit links with clients.</p>
        </div>

        <div class="tools">
          <input id="searchInput" class="search-input" type="text" placeholder="Search by business name..." />
          <button id="refreshBtn" class="btn btn-secondary" type="button">Refresh</button>
        </div>
      </div>

      <div id="messageBox" class="message"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Logo</th>
              <th>ID</th>
              <th>Name</th>
              <th>Category</th>
              <th>City</th>
              <th>Status</th>
              <th>Slug</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="8">Loading businesses...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ikpipurcoztxanrdwzvm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlrcGlwdXJjb3p0eGFucmR3enZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTc0MDIsImV4cCI6MjA5MjA5MzQwMn0.E33Gc3OyYkig81xsvF6T9r_ANtFbSUc24D1vLenn3y4';
    const SITE_BASE_URL = 'https://bssoperations.com';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const refreshBtn = document.getElementById('refreshBtn');
    const messageBox = document.getElementById('messageBox');

    let allBusinesses = [];

    function showMessage(type, text) {
      messageBox.className = 'message show ' + type;
      messageBox.textContent = text;
    }

    function clearMessage() {
      messageBox.className = 'message';
      messageBox.textContent = '';
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return '';
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function isPublishReady(business) {
      return !!(business.name && business.logo && business.address && business.hours);
    }

    async function copyEditLink(token) {
      const privateLink = `${SITE_BASE_URL}/edit.html?token=${encodeURIComponent(token)}`;

      try {
        await navigator.clipboard.writeText(privateLink);
        showMessage('success', 'Private edit link copied.');
      } catch (error) {
        showMessage('error', 'Unable to copy the private edit link.');
      }
    }

    function renderTableRows(items) {
      if (!items.length) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="8" class="empty-box">No businesses found.</td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = items.map((business) => {
        const ready = isPublishReady(business);
        const statusClass = ready ? 'ready' : 'pending';
        const statusText = ready ? 'Ready' : 'Incomplete';
        const logoHtml = business.logo
          ? `<img class="logo-thumb" src="${escapeHtml(business.logo)}" alt="${escapeHtml(business.name || 'Logo')}" />`
          : `<div class="logo-thumb"></div>`;

        const profileLink = business.profileurl
          ? `<a class="small-link" href="${escapeHtml(business.profileurl)}" target="_blank">View Profile</a>`
          : `<span class="small-link secondary" style="pointer-events:none;opacity:0.5;">View Profile</span>`;

        const editLink = business.edit_token
          ? `<a class="small-link secondary" href="edit.html?token=${encodeURIComponent(business.edit_token)}" target="_blank">Edit</a>`
          : `<span class="small-link secondary" style="pointer-events:none;opacity:0.5;">Edit</span>`;

        const copyButton = business.edit_token
          ? `<button class="small-button" type="button" onclick="copyEditLink('${String(business.edit_token).replace(/'/g, "\\'")}')">Copy Edit Link</button>`
          : `<span class="small-link secondary" style="pointer-events:none;opacity:0.5;">Copy Edit Link</span>`;

        return `
          <tr>
            <td>${logoHtml}</td>
            <td>${escapeHtml(business.id)}</td>
            <td>${escapeHtml(business.name || '')}</td>
            <td>${escapeHtml(business.category || '')}</td>
            <td>${escapeHtml(business.city || '')}</td>
            <td><span class="status ${statusClass}">${statusText}</span></td>
            <td>${escapeHtml(business.profile_slug || '')}</td>
            <td>
              <div class="actions">
                ${editLink}
                ${profileLink}
                ${copyButton}
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function applySearch() {
      const term = searchInput.value.trim().toLowerCase();

      if (!term) {
        renderTableRows(allBusinesses);
        return;
      }

      const filtered = allBusinesses.filter((business) => {
        return (business.name || '').toLowerCase().includes(term);
      });

      renderTableRows(filtered);
    }

    async function loadBusinesses() {
      clearMessage();
      tableBody.innerHTML = `
        <tr>
          <td colspan="8">Loading businesses...</td>
        </tr>
      `;

      const { data, error } = await supabaseClient
        .from('businesses')
        .select(`
          id,
          name,
          category,
          city,
          hours,
          logo,
          address,
          profileurl,
          profile_slug,
          edit_token
        `)
        .order('id', { ascending: true });

      if (error) {
        showMessage('error', 'Unable to load businesses.');
        tableBody.innerHTML = `
          <tr>
            <td colspan="8" class="empty-box">Failed to load data.</td>
          </tr>
        `;
        return;
      }

      allBusinesses = data || [];
      renderTableRows(allBusinesses);
    }

    window.copyEditLink = copyEditLink;

    searchInput.addEventListener('input', applySearch);
    refreshBtn.addEventListener('click', loadBusinesses);

    loadBusinesses();
  </script>
</body>
</html>
